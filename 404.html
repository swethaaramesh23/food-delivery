<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Oops! The food page you are looking for does not exist or has been removed from Stackly.">
    <title>Stackly | 404 Page Not Found</title>
    
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="error-wrapper">
        <div class="error-container">
            <!-- Animated 404 illustration -->
            <div class="error-illustration">
                <div class="error-code">404</div>
                <div class="error-illustration-food">
                    <i class="fa-solid fa-pizza-slice" style="color: var(--primary);"></i>
                </div>
            </div>

            <!-- Messages -->
            <h2 class="error-title">Oops! Page Not Found</h2>
            <p class="error-message">It seems the recipe, cuisine, or dashboard panel you are trying to access has been devoured by our foodies or relocated to another address!</p>

            <!-- Search Console -->
            <div class="error-search">
                <form id="error-search-form" action="index.html#menu" style="display: flex; width: 100%;">
                    <input type="text" class="error-search-input" placeholder="Search menu (e.g. Pizza, Burger)..." required>
                    <button type="submit" class="error-search-btn" aria-label="Search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>

            <!-- Action buttons -->
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back To Home</a>
                <a href="index.html#menu" class="btn btn-outline"><i class="fa-solid fa-utensils"></i> Browse Menu</a>
            </div>

            <!-- Social follow icons -->
            <div class="error-socials">
                <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" class="error-social-icon" aria-label="Follow us on Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="error-social-icon" aria-label="Follow us on Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" class="error-social-icon" aria-label="Follow us on Twitter/X">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
                <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="error-social-icon" aria-label="Follow us on LinkedIn">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
                <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" class="error-social-icon" aria-label="Follow us on YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
