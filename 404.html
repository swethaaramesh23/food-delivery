<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {display:flex;justify-content:center;align-items:center;height:100vh;background:#f0f4f8;font-family:'Poppins',sans-serif;}
        .error-container{text-align:center;}
        .error-code{font-size:8rem;color:#ff6b6b;}
        .error-msg{font-size:1.5rem;margin-bottom:1rem;}
        .social-links a{margin:0 0.5rem;color:#555;font-size:1.5rem;transition:color .3s;}
        .social-links a:hover{color:#ff6b6b;}
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-msg">Oops! The page you’re looking for doesn’t exist.</div>
        <a href="index.html" class="btn btn-primary">Go Home</a>
        <div class="social-links" style="margin-top:1.5rem;">
            <a href="https://facebook.com" target="_blank" rel="noopener"><i class="fab fa-facebook-f"></i></a>
            <a href="https://twitter.com" target="_blank" rel="noopener"><i class="fab fa-twitter"></i></a>
            <a href="https://instagram.com" target="_blank" rel="noopener"><i class="fab fa-instagram"></i></a>
            <a href="https://linkedin.com" target="_blank" rel="noopener"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </div>
</body>
</html>
