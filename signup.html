<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new Stackly account today. Enjoy rapid 24/7 delivery, coupons, and order history.">
    <title>Stackly | Create Your Account</title>
    
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="loader">
            <div class="loader-circle"></div>
            <div class="loader-circle"></div>
            <div class="loader-circle"></div>
            <div class="loader-shadow"></div>
            <div class="loader-shadow"></div>
            <div class="loader-shadow"></div>
        </div>
    </div>

    <!-- Back to home icon -->
    <a href="index.html" style="position: fixed; top: 30px; left: 30px; font-weight: 700; color: #1A1A1A; z-index: 10; display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.9); padding: 10px 18px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s ease;">
        <i class="fa-solid fa-arrow-left"></i> Back To Home
    </a>

    <!-- Auth Background Shapes -->
    <div class="auth-wrapper">
        <div class="auth-shape auth-shape-1"></div>
        <div class="auth-shape auth-shape-2"></div>

        <div class="auth-container">
            <div class="auth-card" style="padding: 30px 40px;">
                <!-- Logo Image -->
                <a href="index.html" class="auth-logo">
                    <img src="logo.webp" alt="Stackly Logo" class="auth-logo-img">
                </a>
                <p class="auth-tagline">Satisfying your cravings since 2011</p>

                <h2 class="auth-title" style="margin-bottom: 20px;">Create Account</h2>

                <!-- Main Signup Form -->
                <form id="signup-form">
                    <!-- Name -->
                    <div class="auth-input-group">
                        <input type="text" class="auth-input" id="signup-name" placeholder="Full Name" required autocomplete="name">
                        <i class="fa-regular fa-user"></i>
                    </div>

                    <!-- Email -->
                    <div class="auth-input-group">
                        <input type="email" class="auth-input" id="signup-email" placeholder="Email Address" required autocomplete="email">
                        <i class="fa-regular fa-envelope"></i>
                    </div>

                    <!-- Phone Number -->
                    <div class="auth-input-group">
                        <input type="tel" class="auth-input" id="signup-phone" placeholder="Phone Number" required autocomplete="tel">
                        <i class="fa-solid fa-phone"></i>
                    </div>

                    <!-- Role Dropdown -->
                    <div class="auth-input-group">
                        <select class="auth-input auth-select" id="signup-role" required>
                            <option value="" disabled selected>Select Your Role</option>
                            <option value="Customer">🛒 Customer</option>
                            <option value="Admin">🛡️ Admin</option>
                            <option value="Staff">📋 Staff / Kitchen</option>
                            <option value="Delivery Partner">🏍️ Delivery Partner</option>
                        </select>
                        <i class="fa-solid fa-user-tag"></i>
                    </div>
                    
                    <!-- Password -->
                    <div class="auth-input-group" style="margin-bottom: 12px;">
                        <input type="password" class="auth-input" id="signup-password" placeholder="Password" required autocomplete="new-password">
                        <i class="fa-solid fa-lock"></i>
                        <button type="button" class="toggle-password-signup" data-target="signup-password" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #999999;" aria-label="Toggle Password Visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>

                    <!-- Password strength bar -->
                    <div class="password-strength-container" id="strength-container">
                        <div class="password-strength-bar" id="strength-bar"></div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="auth-input-group">
                        <input type="password" class="auth-input" id="signup-confirm" placeholder="Confirm Password" required autocomplete="new-password">
                        <i class="fa-solid fa-circle-check"></i>
                        <button type="button" class="toggle-password-signup" data-target="signup-confirm" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #999999;" aria-label="Toggle Password Visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>

                    <!-- Terms Checkbox -->
                    <div class="auth-helper-row" style="margin-bottom: 20px;">
                        <label class="auth-checkbox-label" style="text-align: left; align-items: flex-start;">
                            <input type="checkbox" id="signup-terms" required style="margin-top: 4px;"> 
                            <span>I agree to Stackly's <a href="404.html" class="forgot-link">Terms of Service</a> &amp; <a href="404.html" class="forgot-link">Privacy Policy</a></span>
                        </label>
                    </div>

                    <!-- Signup Submit Button -->
                    <button type="submit" class="auth-btn" id="signup-btn" style="margin-bottom: 16px;">
                        Create Account <i class="fa-solid fa-user-plus"></i>
                    </button>
                </form>

                <div class="auth-divider" style="margin: 16px 0;">Or Sign Up With</div>

                <!-- Social Signups -->
                <div class="social-login-grid" style="margin-bottom: 16px;">
                    <a href="404.html" class="social-login-btn google" aria-label="Sign up with Google">
                        <i class="fa-brands fa-google"></i>
                    </a>
                    <a href="404.html" class="social-login-btn facebook" aria-label="Sign up with Facebook">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                    <a href="404.html" class="social-login-btn apple" aria-label="Sign up with Apple">
                        <i class="fa-brands fa-apple"></i>
                    </a>
                </div>

                <p class="auth-switch-prompt">
                    Already have an account? <a href="login.html">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <!-- JS Scripts -->
    <script src="js/auth.js"></script>
</body>
</html>
